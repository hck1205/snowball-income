name: Refresh ticker market data

# Once a month, refresh the WHOLE ticker universe from Yahoo Finance (unofficial, keyless) and
# auto-merge the result to main (= production deploy via Vercel).
#
# Rate-limit note: Yahoo's chart endpoint has no documented limit, so refreshing ~68 tickers in one
# monthly run could burst the runner's IP. Instead of splitting the work across weekdays (the old
# design), we keep a single monthly run but space the requests out with `--delay` so the fetches
# trickle over a few minutes rather than firing back-to-back.
on:
  schedule:
    # 1st of each month, 21:00 UTC == 2nd 06:00 KST.
    - cron: '0 21 1 * *'
  workflow_dispatch:
    inputs:
      only:
        description: 'Comma-separated tickers to refresh (blank = whole universe)'
        required: false
        type: string
      auto_merge:
        description: 'Auto-merge the PR to main (= deploy). Uncheck to open the PR and stop for review.'
        required: false
        default: true
        type: boolean
      provider:
        description: 'Data provider (yahoo needs no key; fmp needs a paid FMP_API_KEY secret)'
        required: false
        default: yahoo
        type: choice
        options:
          - yahoo
          - fmp
      variant:
        description: 'FMP API variant (only used when provider=fmp)'
        required: false
        default: stable
        type: choice
        options:
          - stable
          - legacy

# The job pushes a refresh branch, opens a PR, and (by default) merges it. A scheduled run always
# auto-merges; a manual dispatch can turn that off to review the diff first.
permissions:
  contents: write
  pull-requests: write

env:
  REFRESH_BRANCH: chore/refresh-ticker-data

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Inputs go through env vars rather than being interpolated into the shell, so a dispatch input
      # cannot inject shell. Default provider is Yahoo's free, keyless chart API - the scheduled run
      # never depends on FMP_API_KEY. `--delay=2000` spaces the ~68 sequential fetches ~2s apart
      # (~2-3 min total) so the run stays gentle on the unofficial endpoint. `--only` (manual) narrows
      # the ticker set; blank = whole universe.
      - name: Refresh the ticker universe
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ONLY: ${{ inputs.only }}
          PROVIDER: ${{ inputs.provider || 'yahoo' }}
          VARIANT: ${{ inputs.variant || 'stable' }}
        run: |
          args="--write --provider=$PROVIDER --variant=$VARIANT --delay=2000"
          if [ -n "$ONLY" ]; then
            args="$args --only=$ONLY"
          fi
          npm run ticker:refresh -- $args

      - name: Typecheck
        # Full project (app + scripts + api). Bare `tsc -b` only covers the root (api + middleware).
        run: npx tsc -b tsconfig.build.json

      # NOTE: `test:ci` excludes test/snowball/SnowballApp.test.tsx (broken on main for unrelated
      # reasons). Everything else must pass, so a bad snapshot still fails this gate and nothing ships.
      - name: Test
        run: npm run test:ci

      # A run where nothing changed (or every ticker hit the outlier guard) must not create an empty
      # commit/PR. The refresh branch is recreated fresh each month: drop any stale remote branch first
      # so the push never needs --force.
      - name: Commit the refresh to a fresh branch
        id: commit
        run: |
          git add shared/constants/marketData/marketData.generated.json
          if git diff --cached --quiet; then
            echo "No field changed - market data already current (or all tickers guard-rejected)."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git push origin --delete "$REFRESH_BRANCH" 2>/dev/null || true
          git checkout -B "$REFRESH_BRANCH"
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "chore(data): monthly ticker market data refresh"
          git push origin "$REFRESH_BRANCH"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # Open the PR, then merge it unless a manual dispatch turned auto-merge off. A scheduled run
      # always auto-merges (that is the point of the monthly cadence). The body is built with `echo`
      # into a file rather than a heredoc, whose unindented body would fall below this block scalar's
      # indentation and truncate the run script.
      - name: Open and auto-merge the refresh PR
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          AUTO_MERGE: ${{ github.event_name == 'schedule' || inputs.auto_merge }}
        run: |
          if ! gh pr view "$REFRESH_BRANCH" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            {
              echo 'Automated monthly refresh of `shared/constants/marketData/marketData.generated.json` via Yahoo Finance (unofficial, no API key).'
              echo
              echo 'Only `initialPrice`, `dividendYield` and `frequency` can change here (`dividendGrowth` is derived, never written). Curated values (`name`, `expectedTotalReturn`) are never touched.'
              echo
              echo 'Entries rejected by the outlier guards keep their previous values - check the refresh step logs for `WARN` lines.'
            } > pr-body.md
            gh pr create --base main --head "$REFRESH_BRANCH" \
              --title "chore(data): monthly ticker market data refresh" \
              --body-file pr-body.md
          fi
          if [ "$AUTO_MERGE" = "true" ]; then
            gh pr merge "$REFRESH_BRANCH" --merge --delete-branch
          else
            echo "auto_merge=false - PR left open for manual review."
          fi
